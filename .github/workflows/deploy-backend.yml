name: Deploy backend (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  REGION: asia-southeast1
  REPO: oiltank-ph
  SERVICE: oiltank-ph-api
  JOB: oiltank-ph-ingestor

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Auth via Workload Identity Federation (recommended). Set the two repo secrets:
      #   GCP_WIF_PROVIDER  e.g. projects/123/locations/global/workloadIdentityPools/github/providers/github
      #   GCP_DEPLOY_SA     e.g. github-deployer@<project>.iam.gserviceaccount.com
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Resolve project + image tag
        id: vars
        run: |
          PROJECT_ID="$(gcloud config get-value project)"
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.REPO }}/backend:${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        working-directory: backend
        run: |
          docker build -t "${{ steps.vars.outputs.image }}" .
          docker push "${{ steps.vars.outputs.image }}"

      - name: Deploy API service
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image="${{ steps.vars.outputs.image }}" \
            --region="${{ env.REGION }}" \
            --quiet

      - name: Update ingestor job image
        run: |
          gcloud run jobs update "${{ env.JOB }}" \
            --image="${{ steps.vars.outputs.image }}" \
            --region="${{ env.REGION }}" \
            --quiet
